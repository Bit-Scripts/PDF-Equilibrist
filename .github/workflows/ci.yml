name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test and lint
    runs-on: windows-latest
    strategy:
      matrix:
        python: [3.12]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest flake8

      - name: Run linter
        run: |
          flake8 src tests --max-line-length=120 || true

      - name: Run tests
        run: |
          pytest -q

  build:
    name: Build installer
    needs: test
    env:
      PYTHONUTF8: '1'
    runs-on: windows-latest
    strategy:
      matrix:
        python: [3.12]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest

      - name: Prepare build assets
        run: |
          python tools/prepare_build.py

      - name: Build PyInstaller bundle
        run: |
          pyinstaller PDF-Equilibrist.spec

      - name: Install NSIS (Chocolatey)
        run: |
          choco install nsis -y

      - name: Build NSIS installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path installer\Output -Force
          & 'C:\Program Files (x86)\NSIS\makensis.exe' 'installer\PDF-Equilibrist.nsi'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdf-equilibrist-installer
          path: |
            dist\PDF-Equilibrist
            installer\Output\PDF-Equilibrist-Setup.exe
