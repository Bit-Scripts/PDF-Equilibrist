app-id: io.github.Bit-Scripts.PDFEquilibrist
runtime: org.kde.Platform
runtime-version: '6.9'   # à vérifier/ajuster à la version disponible sur Flathub au moment de la soumission
sdk: org.kde.Sdk
command: pdf-equilibrist

# Pas de --share=network : le vérificateur de mise à jour maison est désactivé
# sous Flatpak (cf. update.py::is_flatpak()) — Flathub gère ses propres mises
# à jour via `flatpak update`.
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home

modules:
  # ── Dépendances Python (PyQt6, PyMuPDF, pdf2docx, pdfplumber, openpyxl,
  #    python-pptx, Pillow, pyparsing) — PAS bandit (dev-only) ni
  #    paddleocr/paddlepaddle (OCR exclu de la v1, cf. mémoire projet).
  #
  #    Le fichier generated-sources.json ci-dessous doit être produit avec
  #    flatpak-pip-generator (nécessite un accès réseau pour résoudre les
  #    wheels + sha256 — à faire sur une machine Linux, pas généré à la main) :
  #
  #      pip install --user git+https://github.com/flatpak/flatpak-builder-tools.git#subdirectory=pip
  #      flatpak-pip-generator --output generated-sources \
  #          PyQt6 PyMuPDF pdf2docx pdfplumber openpyxl python-pptx Pillow pyparsing
  #
  #    puis déplacer generated-sources.json à côté de ce manifest.
  - name: pdf-equilibrist-pip-deps
    buildsystem: simple
    build-commands:
      - "true"   # l'installation réelle est pilotée par generated-sources.json
    sources:
      - generated-sources.json

  - name: pdf-equilibrist
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --no-build-isolation --prefix=${FLATPAK_DEST} .
      - install -Dm644 packaging/flatpak/io.github.Bit-Scripts.PDFEquilibrist.desktop
          ${FLATPAK_DEST}/share/applications/io.github.Bit-Scripts.PDFEquilibrist.desktop
      - install -Dm644 packaging/flatpak/io.github.Bit-Scripts.PDFEquilibrist.metainfo.xml
          ${FLATPAK_DEST}/share/metainfo/io.github.Bit-Scripts.PDFEquilibrist.metainfo.xml
      - install -Dm644 packaging/flatpak/icons/128x128/io.github.Bit-Scripts.PDFEquilibrist.png
          ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/io.github.Bit-Scripts.PDFEquilibrist.png
      - install -Dm644 packaging/flatpak/icons/256x256/io.github.Bit-Scripts.PDFEquilibrist.png
          ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/io.github.Bit-Scripts.PDFEquilibrist.png
    sources:
      # Pour la soumission Flathub définitive : remplacer par une source
      # reproductible (type: git avec un tag de release, ou type: archive
      # avec sha256) — un `type: dir` local n'est accepté qu'en test local,
      # jamais en revue Flathub.
      - type: git
        url: https://github.com/Bit-Scripts/PDF-Equilibrist.git
        tag: v0.1.0   # à faire correspondre au tag de la release à empaqueter
